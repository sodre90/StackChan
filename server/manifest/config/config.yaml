# StackChan AI Configuration
# For local models: Ollama (default), LM Studio, vLLM, or any OpenAI-compatible API

server:
  address: ":12800"

ai:
  # OpenAI-compatible API base URL
  # Ollama:     http://localhost:11434/v1
  # LM Studio:  http://localhost:1234/v1
  # vLLM:       http://localhost:8000/v1
  # OpenAI:     https://api.openai.com/v1
  api_base_url: "http://localhost:11434/v1"

  # API key (empty for local models like Ollama)
  api_key: ""

  # ASR (Speech-to-Text) model
  # Ollama: whisper, whisper-large-v3
  # OpenAI: whisper-1
  asr_model: "whisper-large-v3"

  # LLM model
  # Ollama: qwen2.5, llama3, mistral, etc.
  # OpenAI: gpt-4o-mini, gpt-4o, etc.
  llm_model: "qwen2.5"

  # TTS (Text-to-Speech) model
  # OpenAI: tts-1, tts-1-hd
  # For local TTS, use edge-tts (set to "edge-tts" and run tts_server.py)
  tts_model: "edge-tts"

  # TTS voice (edge-tts Hungarian voices: hu-HU-NoemiNeural, hu-HU-TamasNeural)
  tts_voice: "alloy"

  # System prompt for the LLM
  # System prompt (in Hungarian for HU_HU locale)
  system_prompt: >
    Te vagy a StackChan, egy aranyos AI asztali robot, amely az M5Stack CoreS3-ra épül.
    Van egy képernyőd, amin kifejező szemek és száj látható.
    Legyél barátságos, segítőkész és tömör a válaszaidban.
    Tartsd röviden a válaszokat (100 szó alatt), mert hangosan hangosítod őket.
    Használj meleg, játékos hangnemet.
    Magyarul válaszolj!

  # Enable ASR (automatic speech recognition)
  # If false, the device must send text directly in listen messages
  enable_asr: true

  # Enable TTS (text-to-speech)
  # If false, only text responses are sent (no audio playback)
  enable_tts: true

  # TTS response format (mp3, opus, aac, flac, wav, pcm)
  # opus is recommended for ESP32 playback
  tts_response_format: "opus"

  # Conversation context: number of recent message pairs to keep
  # Set to 0 to disable context (stateless)
  context_messages: 10

  # LLM streaming: stream responses for lower latency
  stream_llm: true

  # Voice activity detection: silence timeout in ms before processing speech.
  # Lower = faster response but may cut off sentences; higher = more natural pauses.
  # Default 800ms. Typical range: 500-1500ms.
  vad_silence_timeout_ms: 800

  # VAD ticker interval in ms: how often the server checks for new audio packets.
  # Lower = faster end-of-speech detection (lower latency) but more CPU usage.
  # Default 100ms. Reduce to 50ms for ultra-fast response.
  vad_ticker_interval_ms: 100

  # WebSocket port for AI protocol (if different from main server port)
  # Set to 0 to use the main server port
  ws_port: 0

  # Enable MCP tools for robot control (head movement, LED, reminders)
  enable_mcp_tools: true
