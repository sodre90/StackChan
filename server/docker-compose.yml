services:
  stackchan:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "12800:12800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - tts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # whisper runs natively (mlx-whisper on Apple Silicon) — see whisper_server.py
  # whisper:
  #   build:
  #     context: .
  #     dockerfile: whisper/Dockerfile
  #   ports:
  #     - "13000:13000"
  #   volumes:
  #     - whisper-models:/tmp/whisper-models
  #   restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile
    ports:
      - "14000:14000"
    restart: unless-stopped

