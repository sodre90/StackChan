services:
  stackchan:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "12800:12800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - whisper
      - tts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    ports:
      - "13000:13000"
    volumes:
      - whisper-models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: piper/Dockerfile
    ports:
      - "14000:14000"
    restart: unless-stopped

volumes:
  whisper-models:
