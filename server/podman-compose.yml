services:
  stackchan:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "12800:12800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./additional_config.yaml:/app/additional_config.yaml:ro
    depends_on:
      - whisper
      - tts
    # host.containers.internal resolves to the host in Podman 4.x+ (rootless & rootful).
    # Needed only if config.yaml points to a host-local service (e.g. llama-server).
    extra_hosts:
      - "host.containers.internal:host-gateway"
    restart: unless-stopped

  whisper:
    build:
      context: .
      dockerfile: wav2vec2/Dockerfile
    ports:
      - "13000:13000"
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: piper/Dockerfile
    ports:
      - "14000:14000"
    restart: unless-stopped

volumes:
  whisper-models:
