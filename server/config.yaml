# Local AI configuration for StackChan
# Uses llama.cpp (LLM) on the host, faster-whisper (ASR) and Piper (TTS) in compose.

# OpenAI-compatible API base URL for LLM (llama.cpp llama-server on the host)
api_base_url: "http://host.docker.internal:8000/v1"

# OpenAI-compatible API base URL for ASR (local faster-whisper server)
asr_base_url: "http://host.docker.internal:13000/v1"

llm_provider: "gemini"

# API key (may be empty for local models)
api_key: ""

# ASR (Speech-to-Text) model name
asr_model: "whisper"

# LLM model name (must match the --alias passed to llama-server)
#llm_model: "Qwen3.6-35B-A3B"
llm_model: "gemini-3.1-flash-lite"

# OpenAI-compatible API base URL for TTS (local Piper server)
tts_base_url: "http://tts:14000/v1"

# TTS model and voice (Piper local TTS — voice file baked into the tts container)
tts_model: "piper"
tts_voice: "hu_HU-anna-medium"
tts_response_format: "opus"

# System prompt
system_prompt: "You are StackChan, a cute AI desktop robot built on M5Stack CoreS3. You have a screen with expressive eyes and a mouth. Be friendly, helpful, and concise. Keep responses VERY short — 1-2 sentences, under 30 words. Responses are spoken aloud so brevity is essential. Use a warm, playful tone. Never use emojis or special characters. Always respond in Hungarian."

# Enable ASR (local Whisper server)
enable_asr: true

# Enable TTS
enable_tts: true

# Conversation context
context_messages: 10

# LLM streaming
stream_llm: true

# ASR language hint (forces Whisper to use this language instead of auto-detect)
asr_language: "hu"

# ASR initial prompt: primes Whisper decoder with expected vocabulary/orthography.
# Greatly improves accuracy for Hungarian (gy, ny, sz, zs, cs, ű, ő, etc.)
asr_initial_prompt: "Szia! Hogy vagy? Beszéljünk magyarul. StackChan egy kedves asztali robot. Kérlek, segíts nekem. Mennyi az idő? Milyen az időjárás Budapesten? Szeretnék zenét hallgatni. Köszönöm szépen!"

# VAD (Voice Activity Detection) settings
# vad_silence_timeout_ms: Wait this long after last speech before triggering ASR
# vad_ticker_interval_ms: How often to scan for new audio packets (lower = faster detection)
# vad_rms_threshold: RMS energy threshold (0.0–1.0) for speech detection.
#   Higher values = less sensitive (filters out more background noise).
#   Lower values = more sensitive (may trigger on quiet speech but also on noise).
#   If you see 15-20s delays with "VAD filter removed ~19s of audio", raise this value.
#   Typical range: 0.01–0.1. Start at 0.05 and adjust based on your environment.
vad_silence_timeout_ms: 800
vad_ticker_interval_ms: 100

vad_rms_threshold: 0.01

# WebSocket port (0 = use main server port)
ws_port: 0

# Enable MCP tools
enable_mcp_tools: true
